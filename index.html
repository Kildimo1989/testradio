<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Wave - Irish Edition</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f4f5f9">
  <style>
    :root {
      --bg-main: #f4f5f9;
      --card-bg: #ffffff;
      --text-main: #1a1a1b;
      --text-muted: #727477;
      --primary-blue: #0056ff;
      --border-radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background-color: var(--bg-main); color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; }

    .app-container {
      width: 100%;
      max-width: 420px;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      border-left: 1px solid #e0e0e2;
      border-right: 1px solid #e0e0e2;
    }

    header {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-main);
    }
    header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; gap: 16px; font-size: 18px; cursor: pointer; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--text-muted); margin: 12px 18px 8px; text-transform: uppercase; letter-spacing: 0.5px; }

    .stations-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 0 18px 18px;
    }
    .station-card {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      position: relative;
    }
    .station-logo-wrapper {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      background: #eee;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .station-logo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .station-name { font-size: 12px; font-weight: 700; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .station-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    
    .edit-badge {
      position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; 
      border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; opacity: 0; transition: opacity 0.2s;
    }
    .station-card:hover .edit-badge { opacity: 1; }

    #player-view {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-main);
      display: none; flex-direction: column; align-items: center; padding: 24px; z-index: 10;
    }
    .player-header { width: 100%; display: flex; justify-content: space-between; font-size: 20px; margin-bottom: 20px; cursor: pointer; }
    
    .vinyl-container {
      width: 260px; height: 260px; background: #111; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center;
      position: relative; margin: 30px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      background: radial-gradient(circle, #2c2c2c 2px, #111 3px, #111 40%, #222 41%, #111 42%, #111 100%);
    }
    .vinyl-container::before {
      content: ''; position: absolute; border: 1px solid rgba(255,255,255,0.05);
      top: 10px; left: 10px; right: 10px; bottom: 10px; border-radius: 50%; pointer-events: none;
    }
    .vinyl-center-label {
      width: 90px; height: 90px; border-radius: 50%; background: #fff; overflow: hidden;
      display: flex; align-items: center; justify-content: center; border: 4px solid #000;
    }
    .vinyl-center-label img { width: 100%; height: 100%; object-fit: cover; }
    
    .spinning { animation: spin 4s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .player-details { width: 100%; text-align: left; margin-top: 20px; }
    .player-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .player-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .player-nowplaying { font-size: 12px; color: var(--primary-blue); font-weight: 500; min-height: 16px; }

    .player-actions-row { display: flex; gap: 8px; width: 100%; margin: 20px 0; }
    .btn-action {
      flex: 1; padding: 10px; border-radius: var(--border-radius); border: none;
      background: var(--primary-blue); color: white; font-weight: 600; font-size: 13px;
      display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer;
    }
    .btn-action.secondary { background: #eef2ff; color: var(--primary-blue); }

    .status-timeline { display: flex; align-items: center; justify-content: space-between; width: 100%; font-size: 12px; margin-bottom: 30px; }
    .status-indicator { display: flex; align-items: center; gap: 6px; font-weight: 600; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .status-dot.live { background: #4cd964; }
    .status-dot.buffering { background: #ffcc00; animation: pulse 1s infinite; }
    .status-dot.error { background: #ff3b30; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    
    .scrub-bar { flex: 1; height: 4px; background: #e0e0e2; margin: 0 12px; border-radius: 2px; position: relative; }
    .scrub-progress { height: 100%; background: #4cd964; width: 100%; border-radius: 2px; }

    .playback-controls { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .btn-circle {
      width: 48px; height: 48px; border-radius: 50%; background: var(--primary-blue); border: none;
      color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px;
    }
    .btn-circle.large { width: 64px; height: 64px; font-size: 24px; }

    .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; z-index: 20; padding: 20px;
    }
    .modal-content {
      background: var(--card-bg); width: 100%; max-width: 360px; border-radius: var(--border-radius);
      padding: 20px; display: flex; flex-direction: column; gap: 14px;
    }
    .modal-content h3 { font-size: 16px; font-weight: 700; }
    .modal-content input {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #e0e0e2; font-size: 14px; outline: none;
    }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
    .btn-modal { padding: 10px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 14px; }
    .btn-modal.save { background: var(--primary-blue); color: white; }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="home-view">
      <header>
        <h1>🔘 Radio Wave</h1>
        <div class="header-actions">
          <span onclick="window.app.openAddModal()">➕ Add Station</span>
        </div>
      </header>

      <div class="section-title">Saved Radios</div>
      <div class="stations-grid" id="saved-grid"></div>

      <div class="section-title">All Irish Stations</div>
      <div class="stations-grid" id="all-grid"></div>
    </div>

    <div id="player-view">
      <div class="player-header">
        <span onclick="closePlayer()">↓ Minimize</span>
        <span id="player-edit-shortcut">⚙️ Edit</span>
      </div>

      <div class="vinyl-container" id="vinyl-disc">
        <div class="vinyl-center-label">
          <img id="player-center-logo" src="" alt="Station Label">
        </div>
      </div>

      <div class="player-details">
        <div class="player-title" id="player-station-name">Station Name</div>
        <div class="player-subtitle" id="player-station-country">Ireland</div>
        <div class="player-metadata" id="player-metadata">Live Broadcast</div>
      </div>

      <div class="player-actions-row">
        <button class="btn-action">📂 Save</button>
        <button class="btn-action secondary">🔗 Share</button>
        <button class="btn-action secondary">🌐 Web</button>
      </div>

      <div class="status-timeline">
        <div class="status-indicator">
          <div class="status-dot live" id="status-dot"></div>
          <span id="status-text">Live</span>
        </div>
        <div class="scrub-bar"><div class="scrub-progress" id="scrub-fill"></div></div>
        <div id="playback-timer">00:00:00</div>
      </div>

      <div class="playback-controls">
        <button class="btn-circle">◀</button>
        <button class="btn-circle large" id="master-play-btn" onclick="togglePlayback()">▶</button>
        <button class="btn-circle">▶</button>
      </div>
    </div>
  </div>

  <div class="modal" id="edit-modal">
    <div class="modal-content">
      <h3 id="modal-title">Edit Station Configurations</h3>
      <input type="text" id="edit-name" placeholder="Station Name">
      <input type="text" id="edit-stream" placeholder="Stream endpoint (https://...)">
      <input type="text" id="edit-logo" placeholder="Logo image asset URL">
      <div class="modal-buttons">
        <button class="btn-modal" onclick="closeModal()">Cancel</button>
        <button class="btn-modal save" onclick="saveStationEdits()">Save Modifications</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
