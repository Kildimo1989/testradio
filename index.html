<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Irish Radio">
<title>Irish Radio</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --bg: #0a1a12;
    --bg2: #122010;
    --surface: #1a2e20;
    --surface2: #213a28;
    --text: #e8f5ee;
    --text2: #8fb89d;
    --text3: #5a8a6a;
    --border: rgba(29,158,117,0.2);
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; flex-direction: column; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: calc(var(--safe-top) + 14px) 16px 14px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
  .header-content { flex: 1; }
  .header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  .header p { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .settings-btn { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; padding: 4px; }

  .search-row { display: flex; gap: 8px; margin-top: 12px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text3); }
  input[type=search] { width: 100%; height: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; padding: 0 12px 0 34px; outline: none; }
  input[type=search]::placeholder { color: var(--text3); }

  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 11px 0; text-align: center; font-size: 14px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .grid-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }
  .grid-wrap::-webkit-scrollbar { display: none; }
  .count-label { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 8px; position: relative; }
  .card:active { background: var(--surface2); }
  .card-logo { width: 50px; height: 50px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .card-logo img { width: 50px; height: 50px; object-fit: contain; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .fav-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px; color: var(--text3); }
  .fav-btn.active { color: #f5c842; }
  .edit-btn { position: absolute; top: 8px; right: 32px; background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text3); padding: 4px; }

  .empty-favs { text-align: center; padding: 3rem 1rem; color: var(--text3); grid-column: 1/-1; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin: 4px 0 8px; grid-column: 1/-1; }

  /* Now Playing Modal */
  .np-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end; }
  .np-modal.active { display: flex; }
  .np-content { background: var(--bg2); width: 100%; max-height: 90vh; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; }
  .np-header { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); }
  .np-close { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; }
  .np-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; gap: 20px; overflow-y: auto; }
  .np-logo { width: 140px; height: 140px; border-radius: 16px; background: var(--surface); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .np-logo img { width: 140px; height: 140px; object-fit: contain; }
  .np-info { text-align: center; }
  .np-name { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .np-program { font-size: 14px; color: var(--text2); }
  .np-controls { display: flex; gap: 16px; justify-content: center; margin-top: 20px; }
  .np-btn { width: 56px; height: 56px; border-radius: 50%; border: none; background: var(--surface); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .np-btn.play { width: 70px; height: 70px; background: var(--green); color: #fff; font-size: 28px; }
  input[type=range] { width: 100%; max-width: 250px; }

  /* Edit Modal */
  .edit-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
  .edit-modal.active { display: flex; }
  .edit-content { background: var(--bg2); border-radius: 16px; padding: 20px; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .edit-content h2 { font-size: 18px; margin-bottom: 16px; color: var(--text); }
  .edit-form label { display: block; font-size: 12px; color: var(--text3); margin-top: 12px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.07em; }
  .edit-form input { width: 100%; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 12px; }
  .edit-form input[type=file] { padding: 6px; }
  .edit-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .edit-buttons button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .btn-save { background: var(--green); color: #fff; }
  .btn-cancel { background: var(--surface); color: var(--text); }
  .btn-reset { background: #b33; color: #fff; }

  .bottom-spacer { height: var(--safe-bottom); background: var(--bg2); flex-shrink: 0; }
  audio { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1>🎙️ Irish Radio</h1>
    <p>Live Irish stations</p>
    <div class="search-row">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="search" id="searchBox" placeholder="Search…" oninput="filter()">
      </div>
    </div>
  </div>
  <button class="settings-btn" title="Edit stations" onclick="showEditPanel()">⚙️</button>
</div>

<div class="tabs">
  <div class="tab active" id="tabAll" onclick="switchTab('all')">All</div>
  <div class="tab" id="tabFavs" onclick="switchTab('favs')">⭐</div>
</div>

<div class="grid-wrap">
  <div class="count-label" id="countLabel"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="bottom-spacer"></div>

<!-- Now Playing Modal -->
<div class="np-modal" id="npModal">
  <div class="np-content">
    <div class="np-header">
      <div style="flex:1"></div>
      <button class="np-close" onclick="closeNowPlaying()">✕</button>
    </div>
    <div class="np-body">
      <div class="np-logo" id="npLogo"></div>
      <div class="np-info">
        <div class="np-name" id="npName">—</div>
        <div class="np-program" id="npProgram"></div>
      </div>
      <div class="np-controls">
        <button class="np-btn" onclick="toggleFavFromModal()">☆</button>
        <button class="np-btn play" id="playBtn" onclick="togglePlayPause()">▶</button>
        <button class="np-btn" onclick="closeNowPlaying()">✕</button>
      </div>
      <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.85" oninput="setVolume(this.value)">
    </div>
  </div>
</div>

<!-- Edit Station Modal -->
<div class="edit-modal" id="editModal">
  <div class="edit-content">
    <h2>Edit Station</h2>
    <div class="edit-form">
      <label>Station Name</label>
      <input type="text" id="editName" readonly>
      
      <label>Stream URL</label>
      <input type="text" id="editStream" placeholder="https://example.com/stream.m3u8">
      
      <label>Logo URL or Upload</label>
      <input type="file" id="editLogo" accept="image/*">
      <small style="color:var(--text3)">Or paste image URL:</small>
      <input type="text" id="editLogoUrl" placeholder="https://example.com/logo.png">
    </div>
    <div class="edit-buttons">
      <button class="btn-reset" onclick="resetStation()">Reset to Default</button>
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveStation()">Save</button>
    </div>
  </div>
</div>

<audio id="player"></audio>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// DEFAULT VERIFIED STATIONS (sourced from RTÉ, RadioIE, IrishRadioLive)
const DEFAULT_STATIONS = [
  { name: 'RTÉ Radio 1', type: 'National', stream: 'https://www.rte.ie/manifests/radio1.m3u8', logo: 'https://cdn.radoxo.com/images/ireland/rte-radio-1.webp', program: 'News & Current Affairs' },
  { name: 'RTÉ 2fm', type: 'National', stream: 'https://www.rte.ie/manifests/2fm.m3u8', logo: 'https://cdn.radoxo.com/images/ireland/rte-2fm.webp', program: 'Music & Entertainment' },
  { name: 'RTÉ Lyric FM', type: 'National', stream: 'https://www.rte.ie/manifests/lyric.m3u8', logo: 'https://cdn.radoxo.com/images/ireland/rte-lyric-fm.webp', program: 'Classical Music' },
  { name: 'RTÉ Raidió na Gaeltachta', type: 'National', stream: 'https://www.rte.ie/manifests/rnag.m3u8', logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/e/e9/RTE_Radi%C3%B3_na_Gaeltachta_logo.svg/200px-RTE_Radi%C3%B3_na_Gaeltachta_logo.svg.png', program: 'Irish Language' },
  { name: 'Newstalk', type: 'National', stream: 'https://stream.newstalk.com/newstalk', logo: 'https://cdn.radoxo.com/images/ireland/newstalk.webp', program: 'News & Talk' },
  { name: 'Today FM', type: 'National', stream: 'https://stream.todayfm.com/todayfm', logo: 'https://cdn.radoxo.com/images/ireland/today-fm.webp', program: 'Pop & Chat' },
  { name: 'Classic Hits Radio', type: 'National', stream: 'https://stream.classichits.ie/classichits', logo: 'https://cdn.radoxo.com/images/ireland/classic-hits-radio.webp', program: 'The Greatest Hits' },
  { name: "Dublin's FM104", type: 'Dublin', stream: 'https://stream.fm104.ie/fm104', logo: 'https://cdn.radoxo.com/images/ireland/fm104.webp', program: 'Top 40 Hits' },
  { name: "Dublin's 98FM", type: 'Dublin', stream: 'https://stream.98fm.ie/98fm', logo: 'https://cdn.radoxo.com/images/ireland/98fm.webp', program: 'Dance & Pop' },
  { name: "Dublin's Q102", type: 'Dublin', stream: 'https://stream.q102.ie/q102', logo: 'https://cdn.radoxo.com/images/ireland/q102.webp', program: '80s & 90s Hits' },
  { name: 'SPIN 1038', type: 'Dublin', stream: 'https://stream.spin1038.ie/spin1038', logo: 'https://cdn.radoxo.com/images/ireland/spin-1038.webp', program: 'Pop & Dance' },
  { name: 'Radio Nova', type: 'Dublin', stream: 'https://stream.radianova.ie/nova', logo: 'https://cdn.radoxo.com/images/ireland/radio-nova.webp', program: 'Rock & Alternative' },
  { name: "Cork's 96FM", type: 'Regional', stream: 'https://stream.96fm.ie/96fm', logo: 'https://cdn.radoxo.com/images/ireland/96fm.webp', program: 'Local Hits' },
  { name: "Cork's Red FM", type: 'Regional', stream: 'https://stream.redfm.ie/redfm', logo: 'https://cdn.radoxo.com/images/ireland/red-fm.webp', program: 'Rock & Pop' },
  { name: 'C103', type: 'Regional', stream: 'https://stream.c103.ie/c103', logo: 'https://cdn.radoxo.com/images/ireland/c103.webp', program: 'Local Hits' },
  { name: 'Radio Kerry', type: 'Regional', stream: 'https://www.radiokerry.ie/stream/mp3', logo: 'https://www.radiokerry.ie/wp-content/themes/radiokerry/images/logo.png', program: 'Local News & Music' },
  { name: 'Clare FM', type: 'Regional', stream: 'https://stream.clarefm.ie/clarefm', logo: 'https://www.clarefm.ie/wp-content/uploads/2023/02/ClareFM_LOGO-02.png', program: 'Local & Talk' },
  { name: 'Live 95', type: 'Regional', stream: 'https://stream.live95.ie/live95', logo: 'https://cdn.radoxo.com/images/ireland/live95.webp', program: 'Music & News' },
  { name: 'Galway Bay FM', type: 'Regional', stream: 'https://stream.galwaybay.ie/galwaybay', logo: 'https://cdn.radoxo.com/images/ireland/galway-bay-fm.webp', program: 'Local & Music' },
  { name: 'iRadio', type: 'Regional', stream: 'https://stream.iradio.ie/iradio', logo: 'https://cdn.radoxo.com/images/ireland/iradio.webp', program: 'Pop Hits' },
];

let stations = JSON.parse(localStorage.getItem('ie-radio-stations')) || JSON.parse(JSON.stringify(DEFAULT_STATIONS));
let currentTab = 'all', currentStation = null, isPlaying = false;
let favs = JSON.parse(localStorage.getItem('ie-radio-favs') || '[]');
let editingStation = null;
const player = document.getElementById('player');

player.onplay = () => { isPlaying = true; updatePlayBtn(); };
player.onpause = () => { isPlaying = false; updatePlayBtn(); };

function saveStations() { localStorage.setItem('ie-radio-stations', JSON.stringify(stations)); }
function saveFavs() { localStorage.setItem('ie-radio-favs', JSON.stringify(favs)); }
function isFav(url) { return favs.includes(url); }

function toggleFav(e, s) {
  e.stopPropagation();
  favs = isFav(s.stream) ? favs.filter(f => f !== s.stream) : [...favs, s.stream];
  saveFavs(); render(getList());
}

function toggleFavFromModal() {
  if (!currentStation) return;
  favs = isFav(currentStation.stream) ? favs.filter(f => f !== currentStation.stream) : [...favs, currentStation.stream];
  saveFavs(); render(getList());
  document.querySelectorAll('.card').forEach(el => el.querySelector('.fav-btn').textContent = isFav(currentStation.stream) ? '★' : '☆');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAll').className = 'tab' + (tab === 'all' ? ' active' : '');
  document.getElementById('tabFavs').className = 'tab' + (tab === 'favs' ? ' active' : '');
  document.getElementById('searchBox').value = '';
  render(getList());
}

function getList() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = currentTab === 'favs' ? stations.filter(s => isFav(s.stream)) : stations;
  if (q) list = list.filter(s => s.name.toLowerCase().includes(q));
  return list;
}

function filter() { render(getList()); }

function render(list) {
  const grid = document.getElementById('grid');
  const cnt = document.getElementById('countLabel');

  if (currentTab === 'favs' && list.length === 0) {
    cnt.textContent = '';
    grid.innerHTML = `<div class="empty-favs" style="grid-column:1/-1">No favourites. Tap ★ to save stations.</div>`;
    return;
  }

  cnt.textContent = list.length + ' station' + (list.length !== 1 ? 's' : '');
  grid.innerHTML = '';

  const q = document.getElementById('searchBox').value;
  const grouped = currentTab === 'all' && !q;

  if (grouped) {
    const byType = {};
    list.forEach(s => {
      if (!byType[s.type]) byType[s.type] = [];
      byType[s.type].push(s);
    });
    ['National','Dublin','Regional'].forEach(type => {
      if (!byType[type]) return;
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = type;
      grid.appendChild(label);
      byType[type].forEach(s => grid.appendChild(makeCard(s)));
    });
  } else {
    list.forEach(s => grid.appendChild(makeCard(s)));
  }
}

function makeCard(s) {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => playStation(s);

  const logo = document.createElement('div');
  logo.className = 'card-logo';
  const img = document.createElement('img');
  img.src = s.logo;
  img.alt = s.name;
  logo.appendChild(img);

  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = s.name;

  const editBtn = document.createElement('button');
  editBtn.className = 'edit-btn';
  editBtn.innerHTML = '✎';
  editBtn.onclick = (e) => { e.stopPropagation(); showEditStation(s); };

  const fav = document.createElement('button');
  fav.className = 'fav-btn' + (isFav(s.stream) ? ' active' : '');
  fav.innerHTML = isFav(s.stream) ? '★' : '☆';
  fav.onclick = (e) => toggleFav(e, s);

  card.appendChild(logo);
  card.appendChild(name);
  card.appendChild(editBtn);
  card.appendChild(fav);
  return card;
}

function playStation(s) {
  currentStation = s;
  player.src = s.stream;
  player.volume = parseFloat(document.getElementById('volSlider').value);
  player.play().catch(()=>{});
  
  document.getElementById('npName').textContent = s.name;
  document.getElementById('npProgram').textContent = s.program;
  
  const logo = document.getElementById('npLogo');
  logo.innerHTML = '<img src="' + s.logo + '" alt="' + s.name + '">';
  document.getElementById('npModal').className = 'np-modal active';
  updatePlayBtn();
}

function closeNowPlaying() { document.getElementById('npModal').className = 'np-modal'; }
function togglePlayPause() { isPlaying ? player.pause() : player.play().catch(()=>{}); }
function updatePlayBtn() { document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶'; }
function setVolume(v) { player.volume = parseFloat(v); }

function showEditStation(s) {
  editingStation = s;
  document.getElementById('editName').value = s.name;
  document.getElementById('editStream').value = s.stream;
  document.getElementById('editLogoUrl').value = s.logo;
  document.getElementById('editLogo').value = '';
  document.getElementById('editModal').className = 'edit-modal active';
}

function closeEditModal() { document.getElementById('editModal').className = 'edit-modal'; }

function saveStation() {
  if (!editingStation) return;
  const file = document.getElementById('editLogo').files[0];
  const stream = document.getElementById('editStream').value;
  const logoUrl = document.getElementById('editLogoUrl').value;
  
  if (!stream) { alert('Stream URL required'); return; }
  
  editingStation.stream = stream;
  if (logoUrl) editingStation.logo = logoUrl;
  else if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      editingStation.logo = e.target.result;
      saveStations(); closeEditModal(); render(getList());
    };
    reader.readAsDataURL(file);
    return;
  }
  
  saveStations(); closeEditModal(); render(getList());
}

function resetStation() {
  if (!editingStation) return;
  const defaults = DEFAULT_STATIONS.find(s => s.name === editingStation.name);
  if (defaults) {
    editingStation.stream = defaults.stream;
    editingStation.logo = defaults.logo;
    saveStations(); closeEditModal(); render(getList());
  }
}

function showEditPanel() {
  const msg = `Edit Station Instructions:\n- Tap the ✎ icon on any station\n- Update stream URL if broken\n- Upload or paste a new logo\n- Tap Save\n\nTo find working streams:\n- RadioIE.com\n- IrishRadioLive.com\n- fmstream.org (Ireland)`;
  alert(msg);
}

render(getList());
</script>
</body>
</html>
