<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Irish Radio">
<title>Irish Radio</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --bg: #0a1a12;
    --bg2: #122010;
    --surface: #1a2e20;
    --surface2: #213a28;
    --text: #e8f5ee;
    --text2: #8fb89d;
    --text3: #5a8a6a;
    --border: rgba(29,158,117,0.2);
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: calc(var(--safe-top) + 14px) 16px 14px; flex-shrink: 0; }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .header-icon { width: 36px; height: 36px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-icon svg { width: 22px; height: 22px; }
  .header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  .header p { font-size: 12px; color: var(--text3); }
  .search-row { display: flex; gap: 8px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text3); pointer-events: none; }
  input[type=search] { width: 100%; height: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; padding: 0 12px 0 34px; outline: none; }
  input[type=search]::placeholder { color: var(--text3); }

  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 11px 0; text-align: center; font-size: 14px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .grid-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }
  .grid-wrap::-webkit-scrollbar { display: none; }
  .count-label { font-size: 12px; color: var(--text3); margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 8px; position: relative; }
  .card:active { background: var(--surface2); }
  .card-logo { width: 50px; height: 50px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .card-logo img { width: 50px; height: 50px; object-fit: contain; }
  .card-logo svg { width: 24px; height: 24px; color: var(--text3); }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .fav-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px; color: var(--text3); }
  .fav-btn.active { color: #f5c842; }

  .empty-favs { text-align: center; padding: 3rem 1rem; color: var(--text3); grid-column: 1/-1; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin: 4px 0 8px; grid-column: 1/-1; }

  /* Now Playing Modal */
  .np-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end; }
  .np-modal.active { display: flex; }
  .np-content { background: var(--bg2); width: 100%; max-height: 90vh; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; padding-top: env(safe-area-inset-top, 0px); }
  
  .np-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.3; filter: blur(20px); }
  .np-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); position: relative; z-index: 2; }
  .np-header-title { font-size: 13px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .np-close { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; padding: 4px; }

  .np-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px; position: relative; z-index: 2; gap: 20px; }
  .np-logo { width: 140px; height: 140px; border-radius: 16px; background: var(--surface); display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  .np-logo img { width: 140px; height: 140px; object-fit: contain; }
  .np-logo svg { width: 70px; height: 70px; color: var(--text3); }

  .np-info { text-align: center; position: relative; z-index: 2; }
  .np-name { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .np-now { font-size: 13px; color: var(--text3); margin-bottom: 12px; }
  .np-program { font-size: 14px; color: var(--text2); line-height: 1.5; max-width: 280px; }

  .np-controls { display: flex; gap: 16px; justify-content: center; align-items: center; position: relative; z-index: 2; margin-top: 20px; }
  .np-btn { width: 56px; height: 56px; border-radius: 50%; border: none; background: var(--surface); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .np-btn:active { background: var(--surface2); }
  .np-btn.play { width: 70px; height: 70px; background: var(--green); color: #fff; font-size: 28px; }
  .np-btn.play:active { background: var(--green-dark); }

  .np-volume { width: 100%; max-width: 300px; padding: 0 16px; position: relative; z-index: 2; }
  .vol-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
  input[type=range] { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: var(--surface); border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--green); border-radius: 50%; cursor: pointer; }

  .bottom-spacer { height: var(--safe-bottom); background: var(--bg2); flex-shrink: 0; }
  audio { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="14" r="3"/><path d="M6.3 9.3a8 8 0 0 1 11.4 0"/><path d="M3 6a13 13 0 0 1 18 0"/>
      </svg>
    </div>
    <div><h1>Irish Radio</h1><p>Live Irish stations</p></div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="search" id="searchBox" placeholder="Search stations…" oninput="filter()">
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tabAll" onclick="switchTab('all')">All Stations</div>
  <div class="tab" id="tabFavs" onclick="switchTab('favs')">⭐ Favourites</div>
</div>

<div class="grid-wrap">
  <div class="count-label" id="countLabel"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="bottom-spacer"></div>

<!-- Now Playing Modal -->
<div class="np-modal" id="npModal">
  <div class="np-content">
    <div class="np-bg" id="npBg"></div>
    
    <div class="np-header">
      <div class="np-header-title">Now playing</div>
      <button class="np-close" onclick="closeNowPlaying()">✕</button>
    </div>

    <div class="np-body">
      <div class="np-logo" id="npLogo"></div>
      
      <div class="np-info">
        <div class="np-name" id="npName">—</div>
        <div class="np-now" id="npNow">Not playing</div>
        <div class="np-program" id="npProgram">Select a station to start listening</div>
      </div>

      <div class="np-controls">
        <button class="np-btn" id="favBtn" onclick="toggleFavFromModal()">☆</button>
        <button class="np-btn play" id="playBtn" onclick="togglePlayPause()">▶</button>
        <button class="np-btn" onclick="closeNowPlaying()">✕</button>
      </div>

      <div class="np-volume">
        <div class="vol-label">Volume</div>
        <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.85" oninput="setVolume(this.value)">
      </div>
    </div>
  </div>
</div>

<audio id="player"></audio>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

const STATIONS = [
  { name: 'RTÉ Radio 1', type: 'National', stream: 'https://icecast.rte.ie/radio1', logo: 'https://cdn.radoxo.com/images/ireland/rte-radio-1.webp', program: 'News & Current Affairs' },
  { name: 'RTÉ 2fm', type: 'National', stream: 'https://icecast.rte.ie/2fm', logo: 'https://cdn.radoxo.com/images/ireland/rte-2fm.webp', program: 'Music & Entertainment' },
  { name: 'RTÉ Lyric FM', type: 'National', stream: 'https://icecast.rte.ie/lyric', logo: 'https://cdn.radoxo.com/images/ireland/rte-lyric-fm.webp', program: 'Classical Music' },
  { name: 'RTÉ Gold', type: 'National', stream: 'https://icecast.rte.ie/gold', logo: 'https://cdn.radoxo.com/images/ireland/rte-gold.webp', program: 'Classic Hits' },
  { name: 'RTÉ Raidió na Gaeltachta', type: 'National', stream: 'https://icecast.rte.ie/rnag', logo: 'https://upload.wikimedia.org/wikipedia/en/thumb/e/e9/RTE_Radi%C3%B3_na_Gaeltachta_logo.svg/200px-RTE_Radi%C3%B3_na_Gaeltachta_logo.svg.png', program: 'Irish Language' },
  { name: 'Newstalk', type: 'National', stream: 'https://stream.newstalk.com/newstalk', logo: 'https://cdn.radoxo.com/images/ireland/newstalk.webp', program: 'News & Talk' },
  { name: 'Today FM', type: 'National', stream: 'https://stream.todayfm.com/todayfm', logo: 'https://cdn.radoxo.com/images/ireland/today-fm.webp', program: 'Pop & Chat' },
  { name: 'Classic Hits Radio', type: 'National', stream: 'https://stream.classichits.ie/classichits', logo: 'https://cdn.radoxo.com/images/ireland/classic-hits-radio.webp', program: 'The Greatest Hits' },
  { name: "Dublin's FM104", type: 'Dublin', stream: 'https://stream.fm104.ie/fm104', logo: 'https://cdn.radoxo.com/images/ireland/fm104.webp', program: 'Top 40 Hits' },
  { name: "Dublin's 98FM", type: 'Dublin', stream: 'https://stream.98fm.ie/98fm', logo: 'https://cdn.radoxo.com/images/ireland/98fm.webp', program: 'Dance & Pop' },
  { name: "Dublin's Q102", type: 'Dublin', stream: 'https://stream.q102.ie/q102', logo: 'https://cdn.radoxo.com/images/ireland/q102.webp', program: '80s & 90s Hits' },
  { name: 'SPIN 1038', type: 'Dublin', stream: 'https://stream.spin1038.ie/spin1038', logo: 'https://cdn.radoxo.com/images/ireland/spin-1038.webp', program: 'Pop & Dance' },
  { name: 'Radio Nova', type: 'Dublin', stream: 'https://stream.radianova.ie/nova', logo: 'https://cdn.radoxo.com/images/ireland/radio-nova.webp', program: 'Rock & Alternative' },
  { name: 'Sunshine 106.8', type: 'Dublin', stream: 'https://stream.sunshine106.ie/sunshine', logo: 'https://cdn.radoxo.com/images/ireland/sunshine-1068.webp', program: 'Pop Hits' },
  { name: "Cork's 96FM", type: 'Regional', stream: 'https://stream.96fm.ie/96fm', logo: 'https://cdn.radoxo.com/images/ireland/96fm.webp', program: 'Local Music' },
  { name: "Cork's Red FM", type: 'Regional', stream: 'https://stream.redfm.ie/redfm', logo: 'https://cdn.radoxo.com/images/ireland/red-fm.webp', program: 'Rock & Pop' },
  { name: 'C103', type: 'Regional', stream: 'https://stream.c103.ie/c103', logo: 'https://cdn.radoxo.com/images/ireland/c103.webp', program: 'Local Hits' },
  { name: 'Radio Kerry', type: 'Regional', stream: 'https://stream.radiokerry.ie/radiokerry', logo: 'https://www.radiokerry.ie/wp-content/themes/radiokerry/images/logo.png', program: 'Local News & Music' },
  { name: 'Clare FM', type: 'Regional', stream: 'https://stream.clarefm.ie/clarefm', logo: 'https://www.clarefm.ie/wp-content/uploads/2023/02/ClareFM_LOGO-02.png', program: 'Local & Talk' },
  { name: 'Live 95', type: 'Regional', stream: 'https://stream.live95.ie/live95', logo: 'https://cdn.radoxo.com/images/ireland/live95.webp', program: 'Music & News' },
  { name: 'Tipp FM', type: 'Regional', stream: 'https://stream.tippfm.ie/tippfm', logo: 'https://www.tippfm.com/wp-content/uploads/2022/01/tippfm-logo.png', program: 'Local Talk' },
  { name: 'WLR FM', type: 'Regional', stream: 'https://stream.wlrfm.ie/wlrfm', logo: 'https://cdn.radoxo.com/images/ireland/wlr-fm.webp', program: 'Local Hits' },
  { name: 'Beat 102 103', type: 'Regional', stream: 'https://stream.beat102103.ie/beat', logo: 'https://cdn.radoxo.com/images/ireland/beat-102-103.webp', program: 'Pop & Dance' },
  { name: 'South East Radio', type: 'Regional', stream: 'https://stream.southeastradio.ie/ser', logo: 'https://www.southeastradio.ie/wp-content/uploads/2020/06/SER_LOGO_ONBLACK_500x500.png', program: 'Local Music' },
  { name: 'Galway Bay FM', type: 'Regional', stream: 'https://stream.galwaybay.ie/galwaybay', logo: 'https://cdn.radoxo.com/images/ireland/galway-bay-fm.webp', program: 'Local & Music' },
  { name: 'iRadio', type: 'Regional', stream: 'https://stream.iradio.ie/iradio', logo: 'https://cdn.radoxo.com/images/ireland/iradio.webp', program: 'Pop Hits' },
  { name: 'Ocean FM', type: 'Regional', stream: 'https://stream.oceanfm.ie/oceanfm', logo: 'https://cdn.radoxo.com/images/ireland/ocean-fm-sligo.webp', program: 'Local & Talk' },
  { name: 'MidWest Radio', type: 'Regional', stream: 'https://stream.midwestradio.ie/midwest', logo: 'https://cdn.radoxo.com/images/ireland/midwest-radio.webp', program: 'Music & News' },
  { name: 'KCLR 96FM', type: 'Regional', stream: 'https://stream.kclr96fm.ie/kclr', logo: 'https://www.kclr96fm.com/wp-content/uploads/2020/09/KCLR-logo.png', program: 'Local Hits' },
  { name: 'LMFM', type: 'Regional', stream: 'https://stream.lmfm.ie/lmfm', logo: 'https://cdn.radoxo.com/images/ireland/lmfm.webp', program: 'Music & Talk' },
  { name: 'Shannonside', type: 'Regional', stream: 'https://stream.shannonside.ie/shannonside', logo: 'https://www.shannonside.ie/wp-content/uploads/2020/08/Shannonside-FM-logo.png', program: 'Local Hits' },
  { name: 'Northern Sound', type: 'Regional', stream: 'https://stream.northernsound.ie/northernsound', logo: 'https://www.northernsound.ie/wp-content/uploads/2020/08/Northern-Sound-logo.png', program: 'Local News' },
  { name: 'East Coast FM', type: 'Regional', stream: 'https://stream.eastcoastfm.ie/eastcoast', logo: 'https://www.eastcoastfm.ie/wp-content/uploads/2022/01/ECR-Logo-Positive-CMYK.png', program: 'Local Music' },
  { name: 'KFM', type: 'Regional', stream: 'https://stream.kfm.ie/kfm', logo: 'https://www.kfmradio.com/wp-content/uploads/2020/06/kfm-logo.png', program: 'Local Hits' },
  { name: 'Midlands 103', type: 'Regional', stream: 'https://stream.midlands103.ie/midlands103', logo: 'https://www.midlands103.com/wp-content/uploads/2022/03/Midlands103_Logo.png', program: 'Music & Talk' },
  { name: 'SPIN South West', type: 'Regional', stream: 'https://stream.spinsouthwest.ie/spinsw', logo: 'https://cdn.radoxo.com/images/ireland/spin-south-west.webp', program: 'Pop & Dance' },
];

let currentStation = null, currentTab = 'all', isPlaying = false;
let favs = JSON.parse(localStorage.getItem('ie-radio-favs') || '[]');
const player = document.getElementById('player');

player.onplay = () => { isPlaying = true; updatePlayBtn(); };
player.onpause = () => { isPlaying = false; updatePlayBtn(); };
player.onended = () => { isPlaying = false; updatePlayBtn(); };

function saveFavs() { localStorage.setItem('ie-radio-favs', JSON.stringify(favs)); }
function isFav(url) { return favs.includes(url); }

function toggleFav(e, s) {
  e.stopPropagation();
  if (isFav(s.stream)) favs = favs.filter(f => f !== s.stream);
  else favs.push(s.stream);
  saveFavs();
  render(getList());
}

function toggleFavFromModal() {
  if (!currentStation) return;
  const btn = document.getElementById('favBtn');
  if (isFav(currentStation.stream)) {
    favs = favs.filter(f => f !== currentStation.stream);
    btn.textContent = '☆';
  } else {
    favs.push(currentStation.stream);
    btn.textContent = '★';
  }
  saveFavs();
  render(getList());
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAll').className = 'tab' + (tab === 'all' ? ' active' : '');
  document.getElementById('tabFavs').className = 'tab' + (tab === 'favs' ? ' active' : '');
  document.getElementById('searchBox').value = '';
  render(getList());
}

function getList() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = currentTab === 'favs' ? STATIONS.filter(s => isFav(s.stream)) : STATIONS;
  if (q) list = list.filter(s => s.name.toLowerCase().includes(q));
  return list;
}

function filter() { render(getList()); }

function render(list) {
  const grid = document.getElementById('grid');
  const cnt = document.getElementById('countLabel');

  if (currentTab === 'favs' && list.length === 0) {
    cnt.textContent = '';
    grid.innerHTML = `<div class="empty-favs" style="grid-column:1/-1;padding:3rem 1rem;text-align:center;color:var(--text3)"><div style="font-size:40px;margin-bottom:10px">☆</div>No favourites yet<br>Tap ★ to save stations</div>`;
    return;
  }

  cnt.textContent = list.length + ' station' + (list.length !== 1 ? 's' : '');
  grid.innerHTML = '';

  const q = document.getElementById('searchBox').value;
  const grouped = currentTab === 'all' && !q;

  if (grouped) {
    const byType = {};
    list.forEach(s => {
      if (!byType[s.type]) byType[s.type] = [];
      byType[s.type].push(s);
    });
    ['National','Dublin','Regional'].forEach(type => {
      if (!byType[type]) return;
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = type;
      grid.appendChild(label);
      byType[type].forEach(s => grid.appendChild(makeCard(s)));
    });
  } else {
    list.forEach(s => grid.appendChild(makeCard(s)));
  }
}

function makeCard(s) {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => playStation(s);

  const logo = document.createElement('div');
  logo.className = 'card-logo';
  const img = document.createElement('img');
  img.src = s.logo;
  img.alt = s.name;
  img.onerror = () => { logo.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="14" r="3"/><path d="M6.3 9.3a8 8 0 0 1 11.4 0"/><path d="M3 6a13 13 0 0 1 18 0"/></svg>`; };
  logo.appendChild(img);

  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = s.name;

  const fav = document.createElement('button');
  fav.className = 'fav-btn' + (isFav(s.stream) ? ' active' : '');
  fav.innerHTML = isFav(s.stream) ? '★' : '☆';
  fav.onclick = (e) => toggleFav(e, s);

  card.appendChild(logo);
  card.appendChild(name);
  card.appendChild(fav);
  return card;
}

function playStation(s) {
  currentStation = s;
  player.src = s.stream;
  player.volume = parseFloat(document.getElementById('volSlider').value);
  player.play().catch(()=>{});
  
  document.getElementById('npName').textContent = s.name;
  document.getElementById('npNow').textContent = 'Now playing';
  document.getElementById('npProgram').textContent = s.program;
  document.getElementById('npBg').style.backgroundImage = `url('${s.logo}')`;
  document.getElementById('favBtn').textContent = isFav(s.stream) ? '★' : '☆';
  document.getElementById('npModal').className = 'np-modal active';

  const logo = document.getElementById('npLogo');
  logo.innerHTML = '';
  const img = document.createElement('img');
  img.src = s.logo;
  img.alt = s.name;
  img.onerror = () => { logo.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="14" r="3"/><path d="M6.3 9.3a8 8 0 0 1 11.4 0"/><path d="M3 6a13 13 0 0 1 18 0"/></svg>`; };
  logo.appendChild(img);

  updatePlayBtn();
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({ title: s.name, artist: 'Irish Radio' });
    navigator.mediaSession.setActionHandler('stop', () => { player.pause(); });
    navigator.mediaSession.setActionHandler('pause', () => { player.pause(); });
    navigator.mediaSession.setActionHandler('play', () => { player.play(); });
  }
}

function closeNowPlaying() {
  document.getElementById('npModal').className = 'np-modal';
}

function togglePlayPause() {
  if (isPlaying) player.pause();
  else player.play().catch(()=>{});
}

function updatePlayBtn() {
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
}

function setVolume(v) {
  player.volume = parseFloat(v);
}

render(getList());
</script>
</body>
</html>
