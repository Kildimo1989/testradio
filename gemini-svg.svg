<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    
    <linearGradient id="emeraldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#222222" stroke-width="4"/>

  <g transform="translate(256, 256)">
    <rect x="-16" y="-50" width="32" height="100" rx="16" fill="url(#emeraldGrad)" filter="url(#glow)"/>
    <circle cx="0" cy="-50" r="24" fill="url(#emeraldGrad)" filter="url(#glow)"/>
    
    <path d="M -40,80 L 40,80 M 0,50 L 0,80" stroke="url(#emeraldGrad)" stroke-width="12" stroke-linecap="round" fill="none"/>
    
    <path d="M -50,-30 A 60,60 0 0,0 -50,30" stroke="#ffffff" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M -80,-50 A 100,100 0 0,0 -80,50" stroke="url(#emeraldGrad)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.7" filter="url(#glow)"/>
    <path d="M -110,-70 A 140,140 0 0,0 -110,70" stroke="url(#emeraldGrad)" stroke-width="14" stroke-linecap="round" fill="none" filter="url(#glow)"/>

    <path d="M 50,-30 A 60,60 0 0,1 50,30" stroke="#ffffff" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M 80,-50 A 100,100 0 0,1 80,50" stroke="url(#emeraldGrad)" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.7" filter="url(#glow)"/>
    <path d="M 110,-70 A 140,140 0 0,1 110,70" stroke="url(#emeraldGrad)" stroke-width="14" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  </g>
</svg>
