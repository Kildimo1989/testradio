<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Irish Radio">
<title>Irish Radio - All Stations</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #2ABF8F;
    --bg: #0a1a12;
    --bg2: #122010;
    --surface: #1a2e20;
    --surface2: #213a28;
    --surface3: #2a4a32;
    --text: #e8f5ee;
    --text2: #8fb89d;
    --text3: #5a8a6a;
    --border: rgba(29,158,117,0.2);
    --radius: 14px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  body { display: flex; flex-direction: column; overflow: hidden; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: calc(var(--safe-top) + 12px) 16px 12px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10; }
  .header-content { flex: 1; }
  .header h1 { font-size: 20px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .header h1 small { font-size: 12px; font-weight: 400; color: var(--text3); }
  .header p { font-size: 11px; color: var(--text3); margin-top: 2px; }
  
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 6px; border-radius: 8px; transition: background 0.2s; }
  .icon-btn:hover { background: var(--surface); }
  .icon-btn.active { color: var(--green); }

  .search-row { display: flex; gap: 8px; margin-top: 10px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text3); }
  input[type=search] { width: 100%; height: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; padding: 0 12px 0 36px; outline: none; transition: border-color 0.2s; }
  input[type=search]:focus { border-color: var(--green); }

  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 12px 0; text-align: center; font-size: 14px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab .badge { background: var(--green); color: var(--bg); font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }

  .grid-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }
  .grid-wrap::-webkit-scrollbar { width: 4px; }
  .grid-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .grid-wrap::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 4px; }
  
  .count-label { font-size: 12px; color: var(--text3); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .count-label .online { color: var(--green); font-weight: 600; }
  
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 640px) { .grid { grid-template-columns: repeat(4, 1fr); } }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 8px; position: relative; transition: all 0.2s; }
  .card:active { transform: scale(0.97); background: var(--surface2); }
  .card.playing { border-color: var(--green); box-shadow: 0 0 20px rgba(29,158,117,0.15); }
  .card-logo { width: 50px; height: 50px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
  .card-logo img { width: 50px; height: 50px; object-fit: contain; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-type { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .card-status { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; align-items: center; }
  .card-status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .card-status .dot.online { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.3); }
  .card-status .dot.offline { background: #f87171; }
  .fav-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 2px 4px; color: var(--text3); transition: color 0.2s; }
  .fav-btn.active { color: #f5c842; }
  .now-playing-indicator { position: absolute; bottom: 8px; right: 8px; font-size: 10px; color: var(--green); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .empty-favs { text-align: center; padding: 3rem 1rem; color: var(--text3); grid-column: 1/-1; }
  .empty-favs i { font-size: 48px; display: block; margin-bottom: 16px; opacity: 0.5; }
  
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); margin: 8px 0 8px; grid-column: 1/-1; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

  /* Now Playing Modal */
  .np-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: flex-end; backdrop-filter: blur(8px); }
  .np-modal.active { display: flex; }
  .np-content { background: var(--bg2); width: 100%; max-height: 85vh; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.3s ease-out; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  
  .np-header { display: flex; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); align-items: center; }
  .np-header .np-station-name { font-size: 16px; font-weight: 600; }
  .np-close { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; padding: 4px 8px; }
  
  .np-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 16px 30px; gap: 16px; overflow-y: auto; }
  .np-logo { width: 140px; height: 140px; border-radius: 20px; background: var(--surface); display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: var(--shadow); }
  .np-logo img { width: 140px; height: 140px; object-fit: contain; }
  .np-info { text-align: center; }
  .np-name { font-size: 22px; font-weight: 700; color: var(--text); }
  .np-program { font-size: 14px; color: var(--text2); margin-top: 4px; }
  .np-metadata { font-size: 13px; color: var(--text3); margin-top: 2px; min-height: 20px; }
  
  .np-controls { display: flex; gap: 20px; justify-content: center; align-items: center; margin-top: 8px; }
  .np-btn { width: 56px; height: 56px; border-radius: 50%; border: none; background: var(--surface); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.2s; }
  .np-btn:active { transform: scale(0.92); }
  .np-btn.play { width: 72px; height: 72px; background: var(--green); color: #fff; font-size: 30px; box-shadow: 0 4px 20px rgba(29,158,117,0.3); }
  .np-btn.play:active { box-shadow: 0 2px 10px rgba(29,158,117,0.2); }
  
  .np-volume { width: 100%; max-width: 280px; display: flex; align-items: center; gap: 12px; margin-top: 8px; }
  .np-volume i { color: var(--text3); font-size: 16px; }
  input[type=range] { -webkit-appearance: none; flex: 1; height: 4px; background: var(--surface); border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--green); cursor: pointer; }
  input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--green); cursor: pointer; border: none; }

  /* Settings Modal */
  .settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(8px); }
  .settings-modal.active { display: flex; }
  .settings-content { background: var(--bg2); border-radius: 20px; padding: 24px; max-width: 500px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .settings-content h2 { font-size: 20px; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .settings-content h2 i { color: var(--green); }
  
  .settings-section { margin-bottom: 20px; }
  .settings-section h3 { font-size: 13px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  
  .station-edit-item { background: var(--surface); border-radius: 10px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); }
  .station-edit-item .station-name { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .station-edit-item .station-name .type { font-weight: 400; font-size: 11px; color: var(--text3); }
  .station-edit-item label { display: block; font-size: 11px; color: var(--text3); margin-top: 8px; margin-bottom: 4px; }
  .station-edit-item input { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
  .station-edit-item input[type=file] { padding: 6px; background: var(--bg); }
  .station-edit-item .edit-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .station-edit-item .edit-actions button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
  .station-edit-item .edit-actions .btn-save { background: var(--green); color: #fff; }
  .station-edit-item .edit-actions .btn-reset { background: #b33; color: #fff; }
  .station-edit-item .edit-actions .btn-reset-stream { background: var(--surface2); color: var(--text); }
  
  .settings-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 16px; }
  .settings-actions button { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
  .settings-actions .btn-close { background: var(--surface); color: var(--text); }
  .settings-actions .btn-reset-all { background: #b33; color: #fff; }

  .bottom-spacer { height: var(--safe-bottom); background: var(--bg2); flex-shrink: 0; }
  audio { display: none; }

  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface2); color: var(--text); padding: 10px 20px; border-radius: 10px; font-size: 14px; border: 1px solid var(--border); z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  @media (max-width: 380px) {
    .header h1 { font-size: 17px; }
    .np-logo { width: 100px; height: 100px; }
    .np-logo img { width: 100px; height: 100px; }
    .np-name { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1>🎙️ Irish Radio <small>📻</small></h1>
    <p id="statusText">All Irish stations at your fingertips</p>
    <div class="search-row">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="search" id="searchBox" placeholder="Search stations…" oninput="filter()">
      </div>
    </div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleSettings()" title="Settings">⚙️</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tabAll" onclick="switchTab('all')">All <span class="badge" id="allCount">0</span></div>
  <div class="tab" id="tabFavs" onclick="switchTab('favs')">⭐ Favorites <span class="badge" id="favCount">0</span></div>
</div>

<div class="grid-wrap">
  <div class="count-label" id="countLabel">
    <span id="stationCount"></span>
    <span class="online" id="onlineCount">● 0 online</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="bottom-spacer"></div>

<!-- Now Playing Modal -->
<div class="np-modal" id="npModal">
  <div class="np-content">
    <div class="np-header">
      <span class="np-station-name">Now Playing</span>
      <button class="np-close" onclick="closeNowPlaying()">✕</button>
    </div>
    <div class="np-body">
      <div class="np-logo" id="npLogo"></div>
      <div class="np-info">
        <div class="np-name" id="npName">—</div>
        <div class="np-program" id="npProgram">Loading...</div>
        <div class="np-metadata" id="npMetadata"></div>
      </div>
      <div class="np-controls">
        <button class="np-btn" id="npFavBtn" onclick="toggleFavFromModal()">☆</button>
        <button class="np-btn play" id="playBtn" onclick="togglePlayPause()">▶</button>
        <button class="np-btn" onclick="closeNowPlaying()">✕</button>
      </div>
      <div class="np-volume">
        <i class="icon">🔊</i>
        <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.85" oninput="setVolume(this.value)">
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="settings-modal" id="settingsModal">
  <div class="settings-content">
    <h2>⚙️ Station Settings</h2>
    <div class="settings-section">
      <h3>Edit Station Streams & Logos</h3>
      <div id="settingsList"></div>
    </div>
    <div class="settings-actions">
      <button class="btn-close" onclick="toggleSettings()">Close</button>
      <button class="btn-reset-all" onclick="resetAllStations()">Reset All</button>
    </div>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<audio id="player"></audio>

  { name: 'Midlands Radio 3', type: 'Regional', stream: 'https://stream.midlandsradio3.ie/mr3', logo: 'https://cdn.radoxo.com/images/ireland/midlands-radio-3.webp', program: 'Local & Music' },
  { name: 'North West Radio', type: 'Regional', stream: 'https://stream.northwestradio.ie/nwr', logo: 'https://cdn.radoxo.com/images/ireland/north-west-radio.webp', program: 'Local & Music' },
  { name: 'Shannonside', type: 'Regional', stream: 'https://stream.shannonside.ie/ssfm', logo: 'https://cdn.radoxo.com/images/ireland/shannonside.webp', program: 'Local & Music' },
  { name: 'South East Radio', type: 'Regional', stream: 'https://stream.southeastradio.ie/ser', logo: 'https://cdn.radoxo.com/images/ireland/south-east-radio.webp', program: 'Local & Music' },

  { name: 'Drogheda FM', type: 'Regional', stream: 'https://stream.droghedafm.ie/dfm', logo: 'https://cdn.radoxo.com/images/ireland/drogheda-fm.webp', program: 'Community Radio' },
  { name: 'East Coast FM', type: 'Regional', stream: 'https://stream.eastcoastfm.ie/ecfm', logo: 'https://cdn.radoxo.com/images/ireland/east-coast-fm.webp', program: 'Local & Music' }
];

// ===== APP STATE =====
let stations = JSON.parse(localStorage.getItem('ie-radio-stations')) || JSON.parse(JSON.stringify(DEFAULT_STATIONS));
let currentTab = 'all';
let currentStation = null;
let isPlaying = false;
let favs = JSON.parse(localStorage.getItem('ie-radio-favs') || '[]');
let reconnectTimeout = null;
let retryCount = 0;
const MAX_RETRIES = 3;
const player = document.getElementById('player');

// ===== AUDIO PLAYER SETUP =====
player.onplay = () => { 
  isPlaying = true; 
  updatePlayBtn(); 
  updateStatus('Playing');
  retryCount = 0;
};

player.onpause = () => { 
  isPlaying = false; 
  updatePlayBtn(); 
  updateStatus('Paused');
};

player.onerror = (e) => {
  console.error('Stream error:', e);
  if (retryCount < MAX_RETRIES) {
    retryCount++;
    showToast(`Reconnecting... (Attempt ${retryCount}/${MAX_RETRIES})`);
    setTimeout(() => {
      if (currentStation && !isPlaying) {
        player.src = currentStation.stream;
        player.play().catch(() => {});
      }
    }, 2000 * retryCount);
  } else {
    showToast('Unable to connect to stream. Please try another station.');
    retryCount = 0;
    updateStatus('Connection failed');
  }
};

// Background audio - keep playing when app is in background
document.addEventListener('visibilitychange', () => {
  if (document.hidden && isPlaying) {
    // Audio continues playing in background
    console.log('App in background, audio continues');
  }
});

// ===== METADATA FETCHING =====
function fetchMetadata(station) {
  // Try to get metadata from radio-browser.info
  const url = `https://radio-browser.info/api/nowplaying?name=${encodeURIComponent(station.name)}`;
  fetch(url)
    .then(res => res.json())
    .then(data => {
      if (data && data.title) {
        document.getElementById('npMetadata').textContent = `🎵 ${data.title}`;
      }
    })
    .catch(() => {
      // Fallback: show program name
      if (station.program) {
        document.getElementById('npMetadata').textContent = `📻 ${station.program}`;
      }
    });
}

// ===== STATION FUNCTIONS =====
function saveStations() { 
  localStorage.setItem('ie-radio-stations', JSON.stringify(stations)); 
}

function saveFavs() { 
  localStorage.setItem('ie-radio-favs', JSON.stringify(favs)); 
}

function isFav(url) { 
  return favs.includes(url); 
}

function toggleFav(e, s) {
  e.stopPropagation();
  favs = isFav(s.stream) ? favs.filter(f => f !== s.stream) : [...favs, s.stream];
  saveFavs();
  render(getList());
  updateFavCount();
}

function toggleFavFromModal() {
  if (!currentStation) return;
  favs = isFav(currentStation.stream) ? favs.filter(f => f !== currentStation.stream) : [...favs, currentStation.stream];
  saveFavs();
  render(getList());
  updateFavCount();
  updateFavButton();
  showToast(isFav(currentStation.stream) ? '⭐ Added to favorites' : '☆ Removed from favorites');
}

function updateFavButton() {
  if (!currentStation) return;
  const btn = document.getElementById('npFavBtn');
  btn.textContent = isFav(currentStation.stream) ? '★' : '☆';
  btn.style.color = isFav(currentStation.stream) ? '#f5c842' : 'var(--text3)';
}

// ===== TAB & FILTER =====
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAll').className = 'tab' + (tab === 'all' ? ' active' : '');
  document.getElementById('tabFavs').className = 'tab' + (tab === 'favs' ? ' active' : '');
  document.getElementById('searchBox').value = '';
  render(getList());
}

function getList() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let list = currentTab === 'favs' ? stations.filter(s => isFav(s.stream)) : stations;
  if (q) list = list.filter(s => s.name.toLowerCase().includes(q) || s.type.toLowerCase().includes(q));
  return list;
}

function filter() { 
  render(getList()); 
}

function updateStatus(text) {
  document.getElementById('statusText').textContent = text || 'All Irish stations at your fingertips';
}

function updateFavCount() {
  const count = stations.filter(s => isFav(s.stream)).length;
  document.getElementById('favCount').textContent = count;
}

// ===== RENDER GRID =====
function render(list) {
  const grid = document.getElementById('grid');
  const cnt = document.getElementById('stationCount');
  const onlineCount = document.getElementById('onlineCount');

  if (currentTab === 'favs' && list.length === 0) {
    cnt.textContent = 'No favorites';
    onlineCount.textContent = '';
    grid.innerHTML = `<div class="empty-favs"><i>⭐</i>No favourites yet. Tap ★ on any station to save it.</div>`;
    return;
  }

  cnt.textContent = list.length + ' station' + (list.length !== 1 ? 's' : '');
  const online = list.filter(s => s.online !== false).length;
  onlineCount.textContent = `● ${online} online`;
  
  grid.innerHTML = '';

  const q = document.getElementById('searchBox').value;
  const grouped = currentTab === 'all' && !q;

  if (grouped) {
    const byType = {};
    list.forEach(s => {
      if (!byType[s.type]) byType[s.type] = [];
      byType[s.type].push(s);
    });
    ['National','Dublin','Regional'].forEach(type => {
      if (!byType[type]) return;
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = type;
      grid.appendChild(label);
      byType[type].forEach(s => grid.appendChild(makeCard(s)));
    });
  } else {
    list.forEach(s => grid.appendChild(makeCard(s)));
  }
  
  updateFavCount();
  document.getElementById('allCount').textContent = stations.length;
}

function makeCard(s) {
  const card = document.createElement('div');
  card.className = 'card' + (currentStation && currentStation.name === s.name && isPlaying ? ' playing' : '');
  
  const logo = document.createElement('div');
  logo.className = 'card-logo';
  const img = document.createElement('img');
  img.src = s.logo || 'https://via.placeholder.com/50/1a2e20/8fb89d?text=📻';
  img.alt = s.name;
  img.onerror = () => { img.src = 'https://via.placeholder.com/50/1a2e20/8fb89d?text=📻'; };
  logo.appendChild(img);
  card.appendChild(logo);

  const info = document.createElement('div');
  info.style.display = 'flex';
  info.style.flexDirection = 'column';
  info.style.flex = '1';
  
  const name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = s.name;
  info.appendChild(name);
  
  const type = document.createElement('div');
  type.className = 'card-type';
  type.textContent = s.type;
  info.appendChild(type);
  
  card.appendChild(info);

  const status = document.createElement('div');
  status.className = 'card-status';
  const dot = document.createElement('span');
  dot.className = 'dot ' + (s.online !== false ? 'online' : 'offline');
  status.appendChild(dot);
  card.appendChild(status);

  if (currentStation && currentStation.name === s.name && isPlaying) {
    const indicator = document.createElement('div');
    indicator.className = 'now-playing-indicator';
    indicator.textContent = '🔴 LIVE';
    card.appendChild(indicator);
  }

  const fav = document.createElement('button');
  fav.className = 'fav-btn' + (isFav(s.stream) ? ' active' : '');
  fav.innerHTML = isFav(s.stream) ? '★' : '☆';
  fav.onclick = (e) => toggleFav(e, s);
  card.appendChild(fav);

  card.onclick = () => playStation(s);
  return card;
}

// ===== PLAY STATION =====
function playStation(s) {
  currentStation = s;
  retryCount = 0;
  
  // Close previous connection if any
  player.pause();
  player.src = s.stream;
  player.volume = parseFloat(document.getElementById('volSlider').value);
  
  // Show Now Playing modal
  document.getElementById('npName').textContent = s.name;
  document.getElementById('npProgram').textContent = s.program || 'Live Stream';
  document.getElementById('npMetadata').textContent = '📻 Connecting...';
  
  const logo = document.getElementById('npLogo');
  logo.innerHTML = `<img src="${s.logo || 'https://via.placeholder.com/140/1a2e20/8fb89d?text=📻'}" alt="${s.name}" onerror="this.src='https://via.placeholder.com/140/1a2e20/8fb89d?text=📻'">`;
  
  document.getElementById('npModal').className = 'np-modal active';
  updateFavButton();
  
  // Start playing
  player.play().catch(err => {
    console.error('Play error:', err);
    showToast('Unable to play stream. Please try again.');
  });
  
  // Fetch metadata
  fetchMetadata(s);
  
  render(getList());
}

function togglePlayPause() {
  if (isPlaying) {
    player.pause();
  } else {
    player.play().catch(() => {});
  }
}

function updatePlayBtn() {
  document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
}

function setVolume(v) {
  player.volume = parseFloat(v);
}

function closeNowPlaying() { 
  document.getElementById('npModal').className = 'np-modal'; 
}

// ===== SETTINGS =====
function toggleSettings() {
  const modal = document.getElementById('settingsModal');
  modal.classList.toggle('active');
  if (modal.classList.contains('active')) {
    renderSettings();
  }
}

function renderSettings() {
  const container = document.getElementById('settingsList');
  container.innerHTML = '';
  stations.forEach((s, index) => {
    const item = document.createElement('div');
    item.className = 'station-edit-item';
    item.innerHTML = `
      <div class="station-name">
        <span>${s.name} <span class="type">${s.type}</span></span>
      </div>
      <label>Stream URL</label>
      <input type="text" id="stream_${index}" value="${s.stream}" placeholder="https://example.com/stream">
      <label>Logo URL</label>
      <input type="text" id="logo_${index}" value="${s.logo || ''}" placeholder="https://example.com/logo.png">
      <label>Or upload logo</label>
      <input type="file" id="logoFile_${index}" accept="image/*">
      <div class="edit-actions">
        <button class="btn-save" onclick="saveStationSettings(${index})">💾 Save</button>
        <button class="btn-reset" onclick="resetStationSettings(${index})">↺ Reset to Default</button>
        <button class="btn-reset-stream" onclick="testStream(${index})">🔊 Test</button>
      </div>
    `;
    container.appendChild(item);
  });
}

function saveStationSettings(index) {
  const streamInput = document.getElementById(`stream_${index}`);
  const logoInput = document.getElementById(`logo_${index}`);
  const fileInput = document.getElementById(`logoFile_${index}`);
  
  if (streamInput) {
    stations[index].stream = streamInput.value;
  }
  
  if (logoInput && logoInput.value) {
    stations[index].logo = logoInput.value;
  }
  
  if (fileInput && fileInput.files.length > 0) {
    const reader = new FileReader();
    reader.onload = (e) => {
      stations[index].logo = e.target.result;
      saveStations();
      renderSettings();
      render(getList());
      showToast('✅ Station updated successfully!');
    };
    reader.readAsDataURL(fileInput.files[0]);
    return;
  }
  
  saveStations();
  renderSettings();
  render(getList());
  showToast('✅ Station updated successfully!');
}

function resetStationSettings(index) {
  const defaultStation = DEFAULT_STATIONS.find(s => s.name === stations[index].name);
  if (defaultStation) {
    stations[index].stream = defaultStation.stream;
    stations[index].logo = defaultStation.logo;
    saveStations();
    renderSettings();
    render(getList());
    showToast('↺ Station reset to default');
  }
}

function resetAllStations() {
  if (confirm('Reset ALL stations to default? This will remove all your custom changes.')) {
    stations = JSON.parse(JSON.stringify(DEFAULT_STATIONS));
    saveStations();
    renderSettings();
    render(getList());
    showToast('↺ All stations reset to default');
  }
}

function testStream(index) {
  const s = stations[index];
  showToast(`Testing: ${s.name}...`);
  const testAudio = new Audio();
  testAudio.src = s.stream;
  testAudio.volume = 0;
  testAudio.play()
    .then(() => {
      showToast(`✅ ${s.name} is working!`);
      testAudio.pause();
      testAudio.src = '';
      s.online = true;
    })
    .catch(() => {
      showToast(`❌ ${s.name} is not responding. Try updating the stream URL.`);
      s.online = false;
    });
  render(getList());
}

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && document.getElementById('npModal').classList.contains('active')) {
    e.preventDefault();
    togglePlayPause();
  }
  if (e.key === 'Escape') {
    closeNowPlaying();
    if (document.getElementById('settingsModal').classList.contains('active')) {
      toggleSettings();
    }
  }
});

// ===== INIT =====
render(getList());
updateFavCount();
document.getElementById('allCount').textContent = stations.length;

// Check for service worker update
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.ready.then(registration => {
    registration.update();
  });
}

console.log('🇮🇪 Irish Radio PWA loaded - ' + stations.length + ' stations');
</script>
