<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Irish Radio">
<title>Irish Radio</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --bg: #0a1a12;
    --bg2: #122010;
    --surface: #1a2e20;
    --surface2: #213a28;
    --text: #e8f5ee;
    --text2: #8fb89d;
    --text3: #5a8a6a;
    --border: rgba(29,158,117,0.2);
    --radius: 14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; }

  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 14px) 16px 14px;
    flex-shrink: 0;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .header-icon { width: 36px; height: 36px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-icon svg { width: 22px; height: 22px; }
  .header h1 { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: var(--text3); }

  .search-row { display: flex; gap: 8px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text3); pointer-events: none; }
  input[type=search], select {
    width: 100%; height: 40px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 15px; outline: none;
  }
  input[type=search] { padding: 0 12px 0 34px; }
  input[type=search]::placeholder { color: var(--text3); }
  select { padding: 0 10px; appearance: none; -webkit-appearance: none; min-width: 120px; max-width: 140px; }

  /* Tabs */
  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { flex: 1; padding: 11px 0; text-align: center; font-size: 14px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .now-playing {
    background: var(--green-dark);
    padding: 10px 16px;
    display: none;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .now-playing.active { display: flex; }
  .np-pulse { width: 10px; height: 10px; background: #fff; border-radius: 50%; flex-shrink: 0; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  .np-info { flex: 1; min-width: 0; }
  .np-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); }
  .np-name { font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-stop { background: rgba(255,255,255,0.15); border: none; border-radius: 8px; color: #fff; font-size: 13px; padding: 6px 14px; cursor: pointer; flex-shrink: 0; }
  .np-stop:active { background: rgba(255,255,255,0.25); }

  .vol-bar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 16px; display: none; align-items: center; gap: 10px; flex-shrink: 0; }
  .vol-bar.active { display: flex; }
  .vol-bar svg { width: 16px; height: 16px; color: var(--text3); flex-shrink: 0; }
  .vol-bar span { font-size: 12px; color: var(--text3); flex-shrink: 0; min-width: 28px; }
  input[type=range] {
    flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
    background: var(--surface2); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    background: var(--green); border-radius: 50%; cursor: pointer;
  }

  .grid-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }
  .grid-wrap::-webkit-scrollbar { display: none; }
  .count-label { font-size: 12px; color: var(--text3); margin-bottom: 10px; padding: 0 2px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 700px) { .grid { grid-template-columns: repeat(4, 1fr); } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 10px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 110px; position: relative;
    -webkit-user-select: none; user-select: none;
  }
  .card:active { background: var(--surface2); }
  .card.playing { border-color: var(--green); background: var(--surface2); }
  .card-logo {
    width: 42px; height: 42px; border-radius: 10px;
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .card-logo img { width: 42px; height: 42px; object-fit: contain; }
  .card-logo svg { width: 22px; height: 22px; color: var(--text3); }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; background: var(--green); color: #fff; padding: 2px 7px; border-radius: 20px; font-weight: 600; align-self: flex-start; }

  /* Fav button */
  .fav-btn {
    position: absolute; top: 8px; right: 8px;
    background: none; border: none; cursor: pointer; padding: 4px;
    color: var(--text3); font-size: 18px; line-height: 1;
    transition: color 0.15s, transform 0.15s;
  }
  .fav-btn:active { transform: scale(1.3); }
  .fav-btn.active { color: #f5c842; }

  .empty-favs { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 15px; line-height: 1.7; }
  .empty-favs svg { width: 40px; height: 40px; color: var(--text3); margin-bottom: 10px; opacity: 0.5; }

  .status { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 15px; }
  .status svg { width: 40px; height: 40px; color: var(--text3); margin-bottom: 10px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .bottom-spacer { height: var(--safe-bottom); background: var(--bg2); flex-shrink: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="14" r="3"/>
        <path d="M6.3 9.3a8 8 0 0 1 11.4 0"/>
        <path d="M3 6a13 13 0 0 1 18 0"/>
      </svg>
    </div>
    <div>
      <h1>Irish Radio</h1>
      <p>Live stations · Republic of Ireland</p>
    </div>
  </div>
  <div class="search-row">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="search" id="searchBox" placeholder="Search stations…" oninput="filter()">
    </div>
    <select id="genreFilter" onchange="filter()">
      <option value="">All genres</option>
    </select>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tabAll" onclick="switchTab('all')">All Stations</div>
  <div class="tab" id="tabFavs" onclick="switchTab('favs')">⭐ Favourites</div>
</div>

<div class="now-playing" id="nowPlaying">
  <div class="np-pulse"></div>
  <div class="np-info">
    <div class="np-label">Now playing</div>
    <div class="np-name" id="npName">—</div>
  </div>
  <button class="np-stop" onclick="stopStation()">Stop</button>
</div>

<div class="vol-bar" id="volBar">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.85" oninput="setVol(this.value)">
  <span id="volPct">85%</span>
</div>

<div class="grid-wrap" id="gridWrap">
  <div class="count-label" id="countLabel"></div>
  <div class="status" id="status">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    <div>Loading stations…</div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="bottom-spacer"></div>
<audio id="player" preload="none"></audio>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

const HARDCODED = [
  { name: 'Radio Kerry', url_resolved: 'https://radiokerry.ie/stream/mp3', tags: 'local,news,talk,music', favicon: 'https://radiokerry.ie/favicon.ico', votes: 9999 },
  { name: 'Clare FM', url_resolved: 'https://listen.clarefm.ie/clarefm', tags: 'local,news,talk,music', favicon: 'https://www.clarefm.ie/favicon.ico', votes: 9998 },
];

let allStations = [], currentUrl = null, currentTab = 'all';
let favourites = JSON.parse(localStorage.getItem('favs') || '[]');
const player = document.getElementById('player');

function saveFavs() { localStorage.setItem('favs', JSON.stringify(favourites)); }

function isFav(url) { return favourites.includes(url); }

function toggleFav(e, url) {
  e.stopPropagation();
  if (isFav(url)) {
    favourites = favourites.filter(f => f !== url);
  } else {
    favourites.push(url);
  }
  saveFavs();
  render(getList());
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAll').className = 'tab' + (tab==='all' ? ' active' : '');
  document.getElementById('tabFavs').className = 'tab' + (tab==='favs' ? ' active' : '');
  document.getElementById('searchBox').value = '';
  document.getElementById('genreFilter').value = '';
  render(getList());
}

function getList() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const g = document.getElementById('genreFilter').value;
  let list = currentTab === 'favs'
    ? allStations.filter(s => isFav(s.url_resolved))
    : allStations;
  if (q) list = list.filter(s => s.name.toLowerCase().includes(q));
  if (g) list = list.filter(s => s.tags.toLowerCase().includes(g));
  return list;
}

function filter() { render(getList()); }

async function loadStations() {
  const mirrors = [
    'https://de1.api.radio-browser.info',
    'https://nl1.api.radio-browser.info',
    'https://at1.api.radio-browser.info'
  ];
  let data = null;
  for (const base of mirrors) {
    try {
      const res = await fetch(`${base}/json/stations/bycountryexact/Ireland?limit=500&hidebroken=true&order=votes&reverse=true`, {
        headers: { 'User-Agent': 'IrishRadioPWA/1.0' }
      });
      if (res.ok) { data = await res.json(); break; }
    } catch(e) {}
  }
  document.getElementById('status').style.display = 'none';
  if (!data || !data.length) {
    document.getElementById('status').innerHTML = '<div>Could not load stations.<br>Check your connection and refresh.</div>';
    document.getElementById('status').style.display = 'block';
    return;
  }

  // Deduplicate by name — keep highest votes
  const seen = {};
  data.forEach(s => {
    if (!s.url_resolved || !s.name.trim()) return;
    const key = s.name.trim().toLowerCase();
    if (!seen[key] || s.votes > seen[key].votes) seen[key] = s;
  });

  // Merge hardcoded (remove any API version of same name first)
  HARDCODED.forEach(h => { seen[h.name.toLowerCase()] = h; });

  allStations = Object.values(seen).sort((a,b) => b.votes - a.votes);

  buildGenres();
  render(getList());
}

function buildGenres() {
  const counts = {};
  allStations.forEach(s => s.tags.split(',').forEach(t => {
    t = t.trim().toLowerCase();
    if (t && t.length > 1) counts[t] = (counts[t]||0)+1;
  }));
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,18);
  const sel = document.getElementById('genreFilter');
  top.forEach(([t]) => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t.charAt(0).toUpperCase()+t.slice(1);
    sel.appendChild(o);
  });
}

function render(list) {
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('countLabel');

  if (currentTab === 'favs' && list.length === 0) {
    countEl.textContent = '';
    grid.innerHTML = `<div class="empty-favs" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <div>No favourites yet.<br>Tap the ★ on any station to save it here.</div>
    </div>`;
    return;
  }

  countEl.textContent = list.length + ' station' + (list.length!==1?'s':'');
  grid.innerHTML = '';
  list.slice(0, 150).forEach(s => {
    const card = document.createElement('div');
    card.className = 'card' + (s.url_resolved === currentUrl ? ' playing' : '');
    card.onclick = () => play(s);

    const logo = document.createElement('div');
    logo.className = 'card-logo';
    if (s.favicon) {
      const img = document.createElement('img');
      img.src = s.favicon; img.alt = '';
      img.onerror = () => { logo.innerHTML = radioIcon(); };
      logo.appendChild(img);
    } else { logo.innerHTML = radioIcon(); }

    const name = document.createElement('div');
    name.className = 'card-name';
    name.textContent = s.name;

    const tags = document.createElement('div');
    tags.className = 'card-tags';
    tags.textContent = s.tags.split(',').filter(t=>t.trim()).slice(0,3).join(' · ') || 'radio';

    const favBtn = document.createElement('button');
    favBtn.className = 'fav-btn' + (isFav(s.url_resolved) ? ' active' : '');
    favBtn.innerHTML = isFav(s.url_resolved) ? '★' : '☆';
    favBtn.setAttribute('aria-label', isFav(s.url_resolved) ? 'Remove from favourites' : 'Add to favourites');
    favBtn.onclick = (e) => toggleFav(e, s.url_resolved);

    card.appendChild(logo);
    card.appendChild(name);
    card.appendChild(tags);

    if (s.url_resolved === currentUrl) {
      const badge = document.createElement('div');
      badge.className = 'card-badge';
      badge.innerHTML = '&#9654; live';
      card.appendChild(badge);
    }

    card.appendChild(favBtn);
    grid.appendChild(card);
  });

  if (list.length > 150) {
    const more = document.createElement('div');
    more.style.cssText = 'grid-column:1/-1;text-align:center;font-size:12px;color:var(--text3);padding:8px 0';
    more.textContent = 'Showing 150 of ' + list.length + ' — search to narrow results';
    grid.appendChild(more);
  }
}

function radioIcon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="14" r="3"/><path d="M6.3 9.3a8 8 0 0 1 11.4 0"/><path d="M3 6a13 13 0 0 1 18 0"/></svg>`;
}

function play(s) {
  currentUrl = s.url_resolved;
  player.src = s.url_resolved;
  player.volume = parseFloat(document.getElementById('volSlider').value);
  player.play().catch(()=>{});
  document.getElementById('npName').textContent = s.name;
  document.getElementById('nowPlaying').className = 'now-playing active';
  document.getElementById('volBar').className = 'vol-bar active';
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({ title: s.name, artist: 'Irish Radio' });
    navigator.mediaSession.setActionHandler('stop', stopStation);
    navigator.mediaSession.setActionHandler('pause', stopStation);
  }
  render(getList());
}

function stopStation() {
  player.pause(); player.src = '';
  currentUrl = null;
  document.getElementById('nowPlaying').className = 'now-playing';
  document.getElementById('volBar').className = 'vol-bar';
  render(getList());
}

function setVol(v) {
  player.volume = parseFloat(v);
  document.getElementById('volPct').textContent = Math.round(v*100)+'%';
}

loadStations();
</script>
</body>
</html>
