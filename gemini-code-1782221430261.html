<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Irish Radio PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <header>
        <h1>Irish Radio</h1>
        <input id="search" type="search" placeholder="Search stations...">
        <div class="backup-controls">
            <button id="exportBtn" title="Export Stations">Backup 📤</button>
            <button id="importBtn" title="Import Stations">Restore 📥</button>
            <input type="file" id="importFile" accept=".json" style="display: none;">
        </div>
    </header>

    <nav>
        <button id="allBtn" class="active">Stations</button>
        <button id="favBtn">Favourites</button>
    </nav>

    <main id="stations"></main>

    <!-- Floating Add Button -->
    <button id="floatingAddBtn" class="floating-btn" title="Add New Station">+</button>

    <!-- Fullscreen Player Overlay UI -->
    <div id="playerOverlay" class="hidden">
        <div id="overlayBlurBg"></div>
        <button id="closeOverlayBtn" class="close-btn">&times;</button>
        <div class="overlay-content">
            <img id="overlayLogo" src="" alt="Station Logo">
            <h2 id="overlayTitle">Station Name</h2>
            <p id="overlayTrack">Loading Stream...</p>
            
            <!-- Sleep Timer Selection -->
            <div class="sleep-timer-section">
                <label for="sleepSelect">Sleep Timer:</label>
                <select id="sleepSelect">
                    <option value="0">Off</option>
                    <option value="15">15 Mins</option>
                    <option value="30">30 Mins</option>
                    <option value="60">60 Mins</option>
                </select>
                <span id="sleepCountdown" class="hidden"></span>
            </div>

            <div class="controls">
                <button id="overlayPlayBtn" class="play-toggle-btn">&#9658;</button>
            </div>
        </div>
    </div>

    <!-- Station Form Modal -->
    <div id="stationModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modalHeader">Station Details</h3>
            <label>Station Name:
                <input type="text" id="stationName" placeholder="e.g., Midwest Radio">
            </label>
            <label>Stream URL:
                <input type="url" id="stationUrl" placeholder="https://...">
            </label>
            <label>Backup Stream URL (Optional):
                <input type="url" id="stationBackupUrl" placeholder="https://...">
            </label>
            <label>Logo URL:
                <input type="url" id="stationLogo" placeholder="https://.../logo.png">
            </label>
            <label>Genre/Tags:
                <input type="text" id="stationGenre" placeholder="e.g., Local News">
            </label>
            <div class="modal-actions">
                <button id="cancelModalBtn">Cancel</button>
                <button id="saveModalBtn">Save</button>
            </div>
        </div>
    </div>

    <audio id="radioPlayer" preload="none" crossorigin="anonymous"></audio>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
    <script src="js/app.js"></script>
</body>
</html>
